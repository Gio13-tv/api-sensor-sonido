<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIDOCare Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans p-6">

    <div class="max-w-5xl mx-auto space-y-6">
        <header class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-bold tracking-tight text-cyan-400">SONIDO<span class="text-white">Care</span></h1>
            <span id="estadoConexion" class="bg-red-500/10 text-red-400 text-xs font-medium px-2.5 py-0.5 rounded-full border border-red-500/20">Desconectado</span>
        </header>

        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
            <h2 class="text-xl font-semibold mb-4 text-slate-300">Monitoreo Físico por WebSockets (Instantáneo)</h2>
            <div class="h-64">
                <canvas id="graficaTiempoReal"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-slate-900 border border-slate-800 rounded-xl p-6 flex flex-col gap-4">
                <h3 class="text-lg font-medium text-slate-200">Panel de Control</h3>
                <button onclick="location.reload()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2 px-4 rounded-lg transition cursor-pointer">
                    Reiniciar Flujo Vivo
                </button>
                <button onclick="filtrarAlertas()" class="w-full bg-red-950 hover:bg-red-900 text-red-200 font-medium py-2 px-4 rounded-lg border border-red-800/50 transition cursor-pointer">
                    Ver Alertas Críticas
                </button>
            </div>

            <div class="md:col-span-2 bg-slate-900 border border-slate-800 rounded-xl p-6">
                <h3 id="tituloTabla" class="text-lg font-medium text-slate-200 mb-4">Flujo de Datos en Tiempo Real</h3>
                <div class="overflow-x-auto max-h-48">
                    <table class="w-full text-sm text-left text-slate-400">
                        <thead class="text-xs text-slate-300 uppercase bg-slate-800/50">
                            <tr>
                                <th class="px-4 py-3">Hora</th>
                                <th class="px-4 py-3">Categoría</th>
                                <th class="px-4 py-3">Porcentaje (Valor Bruto)</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCuerpo"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('graficaTiempoReal').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Nivel Real %', data: [], borderColor: '#22d3ee', backgroundColor: 'rgba(34, 211, 238, 0.05)', borderWidth: 2, fill: true, tension: 0.15 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 0, max: 100, grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
        });

        const tabla = document.getElementById('tablaCuerpo');
        const estado = document.getElementById('estadoConexion');

        // Protocolo automático de WebSocket (Detecta si está local o en Render de forma nativa)
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/en_vivo`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            estado.innerText = "Transmisión en Vivo Conectada";
            estado.className = "bg-emerald-500/10 text-emerald-400 text-xs font-medium px-2.5 py-0.5 rounded-full border border-emerald-500/20";
        };

        ws.onmessage = (event) => {
            const d = JSON.parse(event.data);

            // 1. Empujar datos a la gráfica inmediatamente
            if (chart.data.labels.length >= 12) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(d.fecha_hora);
            chart.data.datasets[0].data.push(d.porcentaje);
            chart.update();

            // 2. Insertar fila superior en la tabla
            const fila = `
                <tr class="border-b border-slate-800 hover:bg-slate-800/40 transition">
                    <td class="px-4 py-3 text-slate-300">${d.fecha_hora}</td>
                    <td class="px-4 py-3 font-semibold ${d.categoria === 'Ruido Alto' ? 'text-red-400' : d.categoria === 'Moderado' ? 'text-yellow-400' : 'text-green-400'}">${d.categoria}</td>
                    <td class="px-4 py-3 text-slate-400 font-mono">${d.porcentaje}% (Nivel: ${d.valor_bruto})</td>
                </tr>
            `;
            tabla.insertAdjacentHTML('afterbegin', fila);
            if (tabla.children.length > 15) tabla.lastElementChild.remove();
        };

        ws.onclose = () => {
            estado.innerText = "Desconectado - Reconectando";
            estado.className = "bg-red-500/10 text-red-400 text-xs font-medium px-2.5 py-0.5 rounded-full border border-red-500/20";
        };

        async function filtrarAlertas() {
            ws.close(); // Pausamos el canal rápido para ver el reporte estático
            document.getElementById('tituloTabla').innerText = "Historial de Alertas Críticas (MongoDB)";
            const res = await fetch('/api/historial/alertas');
            const datos = await res.json();
            tabla.innerHTML = datos.map(d => `
                <tr class="border-b border-slate-800 bg-red-950/10">
                    <td class="px-4 py-3 text-slate-300">${d.fecha_hora}</td>
                    <td class="px-4 py-3 text-red-400 font-bold">${d.categoria}</td>
                    <td class="px-4 py-3 font-mono">${d.porcentaje}% (Nivel: ${d.valor_bruto})</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
